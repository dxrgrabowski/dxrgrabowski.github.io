author1:
  name:              <Dawid> <Grabowski>
  email:             <dxrsoftware@gmail.com>

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I'm Dawid, a Linux C/C++ software engineer 👨‍💻 starting my proffesional career in 2021.
    My career started with C family languages, then I had a few months of Python. 
    Then a short intensive period with UI/UX web technologies. 
    I decided to focus on developing myself towards C languages, Linux and low-level topics.
    First working on a project in procedural C for embedded solutions (DSP CPUs). 
    Then in Full-stack development in C++ from backend solutions using Qt, 
    boost and asynchronous event handling. 
    And creating frontend interfaces in QtQuick using QML.

